services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: negotiation_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/seed.sql:/docker-entrypoint-initdb.d/seed.sql

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/negotiation_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OFFERS_FILE_PATH=data/offers.json
    depends_on:
      - postgres
    volumes:
      - .:/app

volumes:
  pgdata:
